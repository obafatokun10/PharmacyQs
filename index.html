            {"id":"CRA-CD-001","format":"SBA","topic":"CDs","topic_detail":"Controlled Drugs - Validity","difficulty":"medium","stem":"A 45-year-old man presents at a community pharmacy on 30 October 2025 with an NHS prescription for morphine sulfate 10mg/5mL oral solution. The prescription is dated 1 October 2025.\n\nWhich is the most appropriate action for the pharmacist to take?","options":[{"label":"A","text":"Contact the prescriber to request they change the date to 30 October 2025."},{"label":"B","text":"Dispense the prescription as it is within the 28-day validity period."},{"label":"C","text":"Dispense the prescription but inform the man he must collect any remaining balance within 24 hours."},{"label":"D","text":"Inform the man that the prescription has expired and refer him back to his prescriber."},{"label":"E","text":"Make a record in the Controlled Drugs register and dispense the medication."}],"correct":"D","explain_correct":"Morphine sulfate is a Schedule 2 CD. Schedule 2, 3 and 4 CD prescriptions are valid for 28 days from the appropriate date. Per RPS/Home Office guidance, this means the prescription is valid up to and including (appropriate date + 28). For a prescription dated 1 October, the last valid day is 29 October. Presentation on 30 October is past validity, so the pharmacist cannot lawfully dispense and must refer the patient back to the prescriber for a new prescription.","citation":"Misuse of Drugs Regulations 2001; Reg 15 MDR 2001; MEP Edition 45 (RPS, 2022)","explain_wrong":{"A":"Illegal; Regulation 15 of MDR 2001 allows pharmacists to correct minor spelling/omissions but NOT the date.","B":"Schedule 2 CDs are valid for 28 days; the 28th day was 29 October.","C":"the legal validity for dispensing has already passed.","E":"dispensing an expired CD is a breach of the MDR 2001."}},

            return val ? JSON.parse(val) : fallback;

        // === MASTERY LOGIC ===
        function masteryScore(m) {
            if (!m) return 0;
            return (m.correct || 0) * 2 - (m.wrong || 0) * 3 - (m.guessedCorrect || 0) * 1;
        }

        function pickNext(allQuestions, mastery, seenInPass, topicFilter) {
            let pool = topicFilter === "All" ? allQuestions : allQuestions.filter(q => q.topic === topicFilter);
            pool = pool.filter(q => !seenInPass.includes(q.id));
            if (pool.length === 0) return null;
            pool.sort((a, b) => masteryScore(mastery[a.id]) - masteryScore(mastery[b.id]));
            const topSlice = pool.slice(0, Math.max(1, Math.ceil(pool.length / 4)));
            return topSlice[Math.floor(Math.random() * topSlice.length)];
        }
